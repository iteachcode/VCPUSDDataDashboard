<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My RSS Reader</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header>
    <h1>My RSS Reader</h1>
    <button id="refreshFeeds">Refresh</button>
  </header>

  <section id="feedList"></section>

  <footer>
    <input type="url" id="newFeedUrl" placeholder="Add new feed URL" />
    <button id="addFeed">Add Feed</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
